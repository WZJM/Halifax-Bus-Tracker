<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Halifax Bus Tracker</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2c3e50">
    <link rel="apple-touch-icon" href="icon-192.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="HRM Buses">
    <link rel="icon" href="icon-192.png">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <div id="loading-overlay">
        <div class="spinner"></div>
        <h3 id="txt-loading-msg">Connecting to server...<br>This may take up to 40 seconds if the server is waking up.</h3>
    </div>
    
    
    <div id="navbar">
        <div class="nav-title" id="txt-nav-title">HRM Bus Tracker</div>
        <div class="nav-buttons">
            <button class="lang-btn" onclick="setLanguage('en')">EN</button>
            <button class="lang-btn" onclick="setLanguage('fr')">FR</button>
            <button class="lang-btn" onclick="setLanguage('zh')">中文</button>
        </div>
    </div>

<div id="search-container">
        <div class="search-box">
            <span class="search-icon">🔍</span>
            <input type="text" id="route-search" placeholder="Search Route (e.g. 1, 90)...">
            <button id="clear-search" onclick="clearSelection()" style="display:none;">✕</button>
        </div>
        <div id="route-list" class="route-list-hidden"></div>
    </div>

    <div id="warning">
        <button id="warning-btn" onclick="showErrorDetail()">⚠️</button>
    </div>

    <div id="info">
        <h2 id="txt-welcome">Thank you for using HRM Bus Tracker!</h2>
        <p>
            <span id="txt-time">Current Time:</span>
            <time id="current-time">Loading...</time>
        </p>
    </div>

    <div id="locate">
        <button id="locate-btn" onclick="locateUser()">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
        <path d="M12 8c-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4-1.79-4-4-4zm8.94 3A8.994 8.994 0 0 0 13 3.06V1h-2v2.06A8.994 8.994 0 0 0 3.06 11H1v2h2.06A8.994 8.994 0 0 0 11 20.94V23h2v-2.06A8.994 8.994 0 0 0 20.94 13H23v-2h-2.06zM12 19c-3.87 0-7-3.13-7-7s3.13-7 7-7 7 3.13 7 7-3.13 7-7 7z"/>
        </svg>
        </button>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script src="script.js"></script>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then((registration) => {
                        console.log('ServiceWorker registered successfully with scope: ', registration.scope);
                    })
                    .catch((error) => {
                        console.log('ServiceWorker registration failed: ', error);
                    });
            });
        }
    </script>

</body>
</html>
